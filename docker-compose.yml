services:
  casai-db:
    image: postgres:16-alpine
    container_name: casai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: casai_dev
    ports:
      - '5432:5432'
    volumes:
      - casai_pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d casai_dev']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  casai_pgdata:
